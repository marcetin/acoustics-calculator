<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Acoustics Calculator</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><a href="/dashboard">Acoustics Calculator</a></h1>
            <nav class="nav">
                <a href="/dashboard">Dashboard</a>
                <a href="/projects/new">New Project</a>
            </nav>
        </header>

        <main class="main">
            {{template "content" .}}
        </main>

        <footer class="footer">
            <p>&copy; 2024 Acoustics Calculator. Professional acoustic analysis and diffuser placement recommendations.</p>
        </footer>
    </div>

    {{if .Flash}}
    <div class="flash flash-{{.Flash.Type}}">
        {{.Flash.Message}}
    </div>
    {{end}}
</body>
</html>
